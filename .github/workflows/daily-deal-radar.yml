name: Daily Deal Radar

on:
  schedule:
    # 9:00 AM Asia/Kolkata is 3:30 AM UTC.
    - cron: "30 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  source-deals:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: deal_sourcing_agent

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Validate agent
        run: python -m py_compile agent.py web_discovery.py

      - name: Run Daily Deal Radar
        run: python agent.py --email
        env:
          DEAL_AGENT_EMAIL_TO: mehtautkarsh5@gmail.com
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SMTP_HOST: smtp.gmail.com
          SMTP_PORT: 587
          SMTP_USERNAME: mehtautkarsh5@gmail.com
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: mehtautkarsh5@gmail.com

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: daily-deal-radar-report
          path: deal_sourcing_agent/output/deal_sourcing_report.md
          if-no-files-found: ignore

      - name: Persist seen deals
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/seen_deals.json
          git diff --cached --quiet || git commit -m "Update seen deals"
          git push
