name: Daily Deal Radar

on:
  schedule:
    # 9:00 AM Asia/Kolkata is 3:30 AM UTC.
    - cron: "30 3 * * *"
  workflow_dispatch:

jobs:
  source-deals:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: deal_sourcing_agent

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate agent
        run: python -m py_compile agent.py

      - name: Run Daily Deal Radar
        run: python agent.py --email
        env:
          DEAL_AGENT_EMAIL_TO: mehtautkarsh5@gmail.com
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-deal-radar-report
          path: deal_sourcing_agent/output/deal_sourcing_report.md
          if-no-files-found: ignore
