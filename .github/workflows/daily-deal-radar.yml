name: Weekly Deal Radar

on:
  schedule:
    # Sunday 9:00 AM Asia/Kolkata = Sunday 3:30 AM UTC.
    - cron: "30 3 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  source-deals:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: deal_sourcing_agent

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Validate agent
        run: python -m py_compile agent.py web_discovery.py

      - name: Run Daily Deal Radar
        run: python agent.py --email
        env:
          DEAL_AGENT_EMAIL_TO: mehtautkarsh5@gmail.com
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          SMTP_HOST: smtp.gmail.com
          SMTP_PORT: 587
          SMTP_USERNAME: mehtautkarsh5@gmail.com
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: mehtautkarsh5@gmail.com

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: daily-deal-radar-report
          path: deal_sourcing_agent/output/deal_sourcing_report.md
          if-no-files-found: ignore

      - name: Persist seen deals
        if: success()
        working-directory: ${{ github.workspace }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config pull.rebase true

          SEEN_FILE="deal_sourcing_agent/output/seen_deals.json"
          cp "$SEEN_FILE" /tmp/seen_deals.json

          git fetch origin main
          git checkout main
          git reset --hard origin/main
          cp /tmp/seen_deals.json "$SEEN_FILE"

          git add "$SEEN_FILE"
          if git diff --cached --quiet; then
            echo "No changes to seen_deals.json"
            exit 0
          fi
          git commit -m "Update seen deals"

          for attempt in 1 2 3 4 5; do
            if git push origin main; then
              exit 0
            fi
            echo "Push rejected, syncing with origin/main (attempt $attempt/5)..."
            git fetch origin main
            git rebase origin/main
            sleep 2
          done
          exit 1
